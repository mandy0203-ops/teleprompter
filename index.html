<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>提詞機 · 語音跟讀</title>
<style>
:root{
  --bg:#f3ede4;
  --panel:#ebe2d4;
  --ink:#3a342c;
  --ink-soft:#6b5f51;
  --line:#d6c9b5;
  --accent:#a87a5a;
  --accent-soft:#c8a888;
  --warn:#b46a55;
  --ok:#7e9079;
  --shadow:0 4px 18px rgba(80,60,40,.08);
  --radius:12px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow:hidden;
}
header{
  display:flex;align-items:center;gap:14px;
  padding:10px 16px;background:var(--panel);
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
header h1{
  font-size:16px;margin:0;font-weight:600;letter-spacing:1px;
  color:var(--ink);
}
header h1 small{color:var(--ink-soft);font-weight:400;margin-left:6px;font-size:12px}

.mode-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg);border:1px solid var(--line);
  padding:4px 10px;border-radius:999px;font-size:12px;color:var(--ink-soft);
}
.mode-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-soft)}
.mode-pill.live .dot{background:var(--warn);box-shadow:0 0 0 0 var(--warn);animation:pulse 1.6s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(180,106,85,.6)}
  70%{box-shadow:0 0 0 8px rgba(180,106,85,0)}
  100%{box-shadow:0 0 0 0 rgba(180,106,85,0)}
}

.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;flex:1;min-width:0}
.group{
  display:flex;align-items:center;gap:6px;
  background:var(--bg);padding:4px 10px;border-radius:8px;
  border:1px solid var(--line);
  flex-shrink:0;
}
.group label{font-size:12px;color:var(--ink-soft);white-space:nowrap}
.group input[type=range]{width:80px;accent-color:var(--accent)}
.group input[type=number]{
  width:48px;border:none;background:transparent;color:var(--ink);
  font-size:13px;text-align:center;
  -moz-appearance:textfield;
}
.group input[type=number]::-webkit-outer-spin-button,
.group input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.group input[type=color]{width:22px;height:22px;border:none;background:transparent;cursor:pointer;padding:0}
.group select{
  border:none;background:transparent;color:var(--ink);
  font-size:13px;font-family:inherit;outline:none;cursor:pointer;
}

button{
  border:1px solid var(--line);
  background:var(--bg);
  color:var(--ink);
  padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:13px;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;
  transform:translateY(0);
  box-shadow:0 1px 0 rgba(80,60,40,.04);
  transition:transform .12s ease, box-shadow .12s ease, background .15s, border-color .15s, color .15s;
}
button:hover{
  background:var(--accent-soft);border-color:var(--accent-soft);color:#fff;
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(80,60,40,.14);
}
button:active{transform:translateY(0);box-shadow:inset 0 1px 2px rgba(80,60,40,.18)}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 0 rgba(120,80,55,.25)}
button.primary:hover{background:var(--ink);border-color:var(--ink);box-shadow:0 4px 12px rgba(58,52,44,.3)}
button.ghost{background:transparent}
button.toggle.on{background:var(--ok);color:#fff;border-color:var(--ok)}
button.mic.on{background:var(--warn);color:#fff;border-color:var(--warn)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

main{
  display:grid;grid-template-columns:380px 1fr;
  height:calc(100vh - 54px);
}
.editor{
  background:var(--panel);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
}
.editor .editor-head{
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--line);
}
.editor .editor-head span{font-size:12px;color:var(--ink-soft)}
.editor textarea{
  flex:1;border:none;outline:none;resize:none;
  background:transparent;
  padding:14px 16px;font-size:14px;line-height:1.7;color:var(--ink);
  font-family:inherit;
}

.stage{
  position:relative;
  background:var(--ink);
  overflow:hidden;
}
.scroll{
  position:absolute;inset:0;
  overflow:hidden;
  display:flex;justify-content:center;
}
.scroll-inner{
  width:100%;max-width:900px;
  /* 上下都 50vh：保證第一個字跟最後一個字都能準確置中於指示線 */
  /* 下邊距用 60vh + 額外 buffer 容納 header wrap 變高的情況 */
  padding:50vh 8% 70vh 8%;
  color:#f3ede4;
  font-weight:500;
  white-space:pre-wrap;
  word-break:break-word;
  transition:none;
}
.ch{display:inline;transition:color .25s,opacity .25s}
.ch.spoken{color:var(--accent-soft);opacity:.55}
.ch.current{
  color:#fff;
  background:rgba(168,122,90,.35);
  border-radius:3px;padding:0 2px;margin:0 -2px;
}

/* 視線指示線：漸層淡出 + 中央發光圓點，比 dashed+三角形更有「視線落點」儀式感 */
.indicator{
  position:absolute;left:0;right:0;top:50%;
  height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(200,168,136,.25) 18%,
    rgba(200,168,136,.5) 50%,
    rgba(200,168,136,.25) 82%,
    transparent 100%);
  pointer-events:none;
  transition:background .4s ease;
}
.indicator::before{
  content:"";position:absolute;left:50%;top:50%;
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
  transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(168,122,90,.55);
  transition:box-shadow .4s ease, background .4s ease;
}
/* voice 模式：整條線呼吸，中央點光暈也跟著脈動，給「機器活著」的安全感 */
.indicator.listening{
  animation:line-breathe 2.2s ease-in-out infinite;
}
.indicator.listening::before{
  animation:dot-breathe 2.2s ease-in-out infinite;
}
@keyframes line-breathe{
  0%,100%{opacity:.7}
  50%{opacity:1}
}
@keyframes dot-breathe{
  0%,100%{box-shadow:0 0 12px rgba(168,122,90,.55)}
  50%{box-shadow:0 0 24px rgba(200,168,136,.85)}
}

.stage.mirror-h .scroll-inner{transform:scaleX(-1)}
.stage.mirror-v .scroll-inner{transform:scaleY(-1)}
.stage.mirror-h.mirror-v .scroll-inner{transform:scale(-1,-1)}

.progress{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(243,237,228,.08);overflow:hidden}
.progress-bar{height:100%;background:var(--accent-soft);width:0%;transition:width .1s linear}
/* 完成那一刻的金光掃過 */
.progress-bar.done{
  background:linear-gradient(90deg, var(--accent-soft), #e8d3b6, var(--accent-soft));
  background-size:200% 100%;
  animation:shine 1.2s ease-out;
  box-shadow:0 0 16px rgba(200,168,136,.6);
}
@keyframes shine{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* 完成 ✓ 圖示——念到稿尾時短暫出現 */
.completion-mark{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  font-size:18vh;color:var(--accent-soft);font-weight:300;
  transition:opacity .4s ease;
}
.completion-mark.show{
  opacity:1;
  animation:check-pop .6s cubic-bezier(.2,.8,.3,1.2);
}
@keyframes check-pop{
  0%{transform:scale(.6);opacity:0}
  60%{transform:scale(1.08);opacity:1}
  100%{transform:scale(1);opacity:1}
}

/* 倒數：數字脈動進場、下方有引導文字（深呼吸/看鏡頭/準備） */
.countdown{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  pointer-events:none;opacity:0;
  transition:opacity .25s ease;
}
.countdown.show{opacity:1}
.countdown .cd-num{
  font-size:22vh;color:var(--accent-soft);
  font-weight:300;letter-spacing:-.04em;
  line-height:1;
  animation:num-pop .55s ease-out;
}
.countdown .cd-cap{
  font-size:2.4vh;color:rgba(243,237,228,.55);
  letter-spacing:.3em;font-weight:400;
  animation:cap-fade .55s ease-out;
}
@keyframes num-pop{
  0%{transform:scale(1.5);opacity:0}
  35%{transform:scale(1);opacity:1}
  100%{transform:scale(.95);opacity:.85}
}
@keyframes cap-fade{
  0%{opacity:0;transform:translateY(8px)}
  60%{opacity:.55;transform:translateY(0)}
  100%{opacity:.55;transform:translateY(0)}
}

/* 浮動麥克風指示器：全螢幕下也會看到，讓使用者知道機器正在聽 */
.stage-mic-pill{
  position:absolute;top:18px;right:18px;
  display:none;align-items:center;gap:8px;
  background:rgba(180,106,85,.92);color:#fff;
  padding:6px 12px;border-radius:999px;
  font-size:12px;letter-spacing:.5px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  pointer-events:none;
  z-index:5;
}
.stage-mic-pill.show{display:inline-flex;animation:mic-fadein .3s ease}
.stage-mic-pill .live-dot{
  width:7px;height:7px;border-radius:50%;background:#fff;
  animation:mic-blink 1.4s ease-in-out infinite;
}
@keyframes mic-blink{
  0%,100%{opacity:.4}
  50%{opacity:1}
}
@keyframes mic-fadein{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

.hint{
  position:absolute;left:14px;bottom:14px;
  font-size:11px;color:rgba(243,237,228,.4);
  font-family:ui-monospace,Menlo,monospace;line-height:1.6;
  pointer-events:none;user-select:none;
}

.recog-strip{
  position:absolute;right:14px;bottom:14px;max-width:40%;
  font-size:12px;color:rgba(243,237,228,.55);
  font-family:ui-monospace,Menlo,monospace;
  text-align:right;line-height:1.5;
  pointer-events:none;
}
.recog-strip b{color:var(--accent-soft);font-weight:500}

.toast{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  background:rgba(180,106,85,.92);color:#fff;
  padding:10px 18px;border-radius:8px;font-size:13px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  opacity:0;pointer-events:none;transition:opacity .25s;
  max-width:80%;
}
.toast.show{opacity:1}

.fullscreen .editor{display:none}
.fullscreen main{grid-template-columns:1fr}
.fullscreen header{display:none}
.fullscreen .stage{height:100vh}

@media (max-width:640px), (pointer:coarse) and (max-width:900px){
  main{grid-template-columns:1fr;grid-template-rows:35vh 1fr}
  .editor{border-right:none;border-bottom:1px solid var(--line)}
}
</style>
</head>
<body>
<header>
  <h1>提詞機 <small>語音跟讀 · Voice-Follow</small></h1>
  <span class="mode-pill" id="modePill" role="status" aria-live="polite"><span class="dot"></span><span id="modeLabel">手動</span></span>
  <div class="controls">
    <div class="group">
      <label>速度</label>
      <input type="range" id="speed" min="1" max="100" value="30">
      <input type="number" id="speedNum" min="1" max="100" value="30">
    </div>
    <div class="group">
      <label>字級</label>
      <input type="range" id="fontSize" min="24" max="160" value="64">
      <input type="number" id="fontSizeNum" min="24" max="160" value="64">
    </div>
    <div class="group">
      <label>行高</label>
      <input type="range" id="lineHeight" min="100" max="240" value="160">
      <input type="number" id="lineHeightNum" min="100" max="240" value="160">
    </div>
    <div class="group">
      <label>語音</label>
      <select id="lang">
        <option value="zh-TW">繁體中文</option>
        <option value="zh-CN">簡體中文</option>
        <option value="en-US">English</option>
        <option value="ja-JP">日本語</option>
      </select>
    </div>
    <div class="group">
      <label>字</label>
      <input type="color" id="fontColor" value="#f3ede4">
      <label>底</label>
      <input type="color" id="bgColor" value="#3a342c">
    </div>
    <button class="toggle" id="mirrorH" title="水平鏡像">⇋</button>
    <button class="toggle" id="mirrorV" title="垂直鏡像">⇅</button>
  </div>
  <div style="display:flex;gap:8px">
    <button id="importBtn" class="ghost" title="匯入 .txt">匯入</button>
    <input type="file" id="importFile" accept=".txt,.md" hidden>
    <button id="resetBtn" class="ghost" title="R · 跟讀中按一次=重對齊到目前位置；Shift+R=回到開頭">重對齊</button>
    <button id="micBtn" class="mic" title="V" aria-label="切換語音跟讀">🎤 跟讀</button>
    <button id="playBtn" class="primary" title="空白鍵" aria-label="切換自動播放">▶ 自動</button>
    <button id="fsBtn" class="ghost" title="F">全螢幕</button>
  </div>
</header>

<main>
  <section class="editor">
    <div class="editor-head">
      <span id="charCount">0 字</span>
      <span>稿件</span>
    </div>
    <textarea id="script" placeholder="把講稿貼進來。準備好就按右上「跟讀」開始念，畫面會自動跟著你的語速捲動。"></textarea>
  </section>
  <section class="stage" id="stage">
    <div class="scroll" id="scroll">
      <div class="scroll-inner" id="scrollInner"></div>
    </div>
    <div class="indicator" id="indicator"></div>
    <div class="stage-mic-pill" id="stageMicPill"><span class="live-dot"></span>跟讀中</div>
    <div class="completion-mark" id="completionMark">✓</div>
    <div class="countdown" id="countdown"><span class="cd-num"></span><span class="cd-cap"></span></div>
    <div class="hint">空白＝自動播放　V＝語音跟讀　↑↓＝速度　R＝重對齊　Shift+R＝回開頭　F＝全螢幕</div>
    <div class="recog-strip" id="recogStrip"></div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="toast" id="toast"></div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);

const els = {
  script: $('#script'),
  charCount: $('#charCount'),
  scroll: $('#scroll'),
  scrollInner: $('#scrollInner'),
  speed: $('#speed'), speedNum: $('#speedNum'),
  fontSize: $('#fontSize'), fontSizeNum: $('#fontSizeNum'),
  lineHeight: $('#lineHeight'), lineHeightNum: $('#lineHeightNum'),
  fontColor: $('#fontColor'),
  bgColor: $('#bgColor'),
  mirrorH: $('#mirrorH'), mirrorV: $('#mirrorV'),
  playBtn: $('#playBtn'), resetBtn: $('#resetBtn'), fsBtn: $('#fsBtn'),
  micBtn: $('#micBtn'), lang: $('#lang'),
  importBtn: $('#importBtn'), importFile: $('#importFile'),
  stage: $('#stage'),
  progressBar: $('#progressBar'),
  countdown: $('#countdown'),
  modePill: $('#modePill'), modeLabel: $('#modeLabel'),
  recogStrip: $('#recogStrip'),
  toast: $('#toast'),
  indicator: $('#indicator'),
  stageMicPill: $('#stageMicPill'),
  completionMark: $('#completionMark'),
  cdNum: document.querySelector('#countdown .cd-num'),
  cdCap: document.querySelector('#countdown .cd-cap'),
};

const state = {
  // 顯式狀態機（中間狀態納入建模）
  mode:'idle',          // 'idle' | 'counting' | 'auto' | 'startingMic' | 'voice'
  counting:false,       // 倒數中（與 mode='counting' 同步，但 setTimeout 內讀 state.counting 比較簡潔）
  starting:false,       // ensureMicStream 進行中（防止重入 startVoice）
  // 設定
  speed:30,
  fontSize:64,
  lineHeight:160,
  fontColor:'#f3ede4',
  bgColor:'#3a342c',
  mirrorH:false, mirrorV:false,
  lang:'zh-TW',
  // scroll
  position:0,
  targetPosition:0,
  lastT:0, raf:null,
  // script
  charSpans:[],
  charNorms:[],
  charIdx:0,
  // speech
  recognition:null,
  recognitionToken:0,
  recognitionBaseFinal:'',
  recognitionLastFinalIndex:0,
  recognitionLastEndAt:0,
  recognitionRestartCount:0,
  micStream:null,
  // sensors
  manualScrollLock:0,
  lastAdvanceAt:0,
  stuckWarned:false,
  // 集中式 timer refs（避免散落、方便 dispose）
  timers: {
    save: null,
    render: null,
    countdown: null,
    completion: null,
    completionStop: null,
    langSwitch: null,
    resetRestart: null,
    onendRestart: null,
    startRetry: null,
    toast: null,
  },
  _quotaWarned: false,
  recentEnds: [],
};

// 統一清掉所有跨流程 timer（mode 切換或 dispose 時用）
function clearAllTimers(){
  for(const k in state.timers){
    if(state.timers[k]){ clearTimeout(state.timers[k]); state.timers[k] = null; }
  }
}
function clearTimerRef(name){
  if(state.timers[name]){ clearTimeout(state.timers[name]); state.timers[name] = null; }
}

const STORAGE = 'teleprompter:v2';
const PUNCT = /[\s\r\n，。！？、；：「」『』（）()【】[\]—…·.,!?;:'"`~@#$%^&*\-_=+/\\<>]/;

// 字元等價映射：把易混字 collapse 成代表字，提升辨識/腳本對齊容錯
// 涵蓋：① 中文同音字（它/他/在/再/做/作/的/得/地…）② 簡繁高頻字 ③ 數字阿拉伯↔中文
const NORMALIZE_MAP = (() => {
  const m = Object.create(null);
  // ── 同音 / 多形 ──（念出來容易混淆，全部 collapse 到代表字）
  const groups = [
    ['他','它','她','牠'],
    ['在','再'],
    ['做','作'],
    ['的','得','地'],
    ['你','妳'],
    ['是','事'],
    ['以','已','已'],
    ['那','哪'],
    ['因','應'],
    ['才','纔'],
    ['麼','嘛'],
    ['只','祇','衹'],
  ];
  for(const g of groups){
    const rep = g[0];
    for(const c of g) m[c] = rep;
  }
  // ── 簡繁高頻字（簡 → 繁，~150 組常用） ──
  const simp2trad = {
    '对':'對','会':'會','过':'過','这':'這','么':'麼','为':'為','发':'發','说':'說',
    '们':'們','后':'後','里':'裡','体':'體','学':'學','应':'應','时':'時','间':'間',
    '问':'問','题':'題','样':'樣','长':'長','门':'門','开':'開','关':'關','现':'現',
    '场':'場','车':'車','马':'馬','鸟':'鳥','鱼':'魚','龙':'龍','飞':'飛','风':'風',
    '专':'專','业':'業','团':'團','国':'國','圆':'圓','声':'聲','听':'聽','觉':'覺',
    '认':'認','识':'識','证':'證','话':'話','语':'語','请':'請','谢':'謝','让':'讓',
    '没':'沒','应':'應','给':'給','带':'帶','头':'頭','脸':'臉','体':'體','乐':'樂',
    '钟':'鐘','钱':'錢','银':'銀','贝':'貝','买':'買','卖':'賣','贵':'貴','货':'貨',
    '产':'產','质':'質','报':'報','纸':'紙','书':'書','笔':'筆','画':'畫','图':'圖',
    '号':'號','级':'級','约':'約','结':'結','队':'隊','员':'員','单':'單','简':'簡',
    '议':'議','计':'計','划':'劃','节':'節','创':'創','机':'機','视':'視','听':'聽',
    '电':'電','网':'網','线':'線','络':'絡','统':'統','系':'系','软':'軟','硬':'硬',
    '务':'務','须':'須','虑':'慮','虚':'虛','实':'實','际':'際','观':'觀','点':'點',
    '难':'難','易':'易','众':'眾','众':'眾','丑':'醜','变':'變','华':'華','协':'協',
    '区':'區','卫':'衛','厅':'廳','双':'雙','发':'發','吕':'呂','听':'聽','营':'營',
    '县':'縣','础':'礎','环':'環','积':'積','称':'稱','复':'復','内':'內','岁':'歲',
    '个':'個','么':'麼','么':'麼','与':'與','汉':'漢','两':'兩','严':'嚴','丧':'喪',
    '样':'樣','医':'醫','艺':'藝','应':'應','广':'廣','录':'錄','导':'導','执':'執',
    '挂':'掛','据':'據','摆':'擺','击':'擊','拥':'擁','蕴':'蘊','尘':'塵','岛':'島',
    '层':'層','属':'屬','幅':'幅','弹':'彈','征':'徵','彻':'徹','径':'徑','悦':'悅',
    '惊':'驚','愈':'癒','才':'纔','扑':'撲','抢':'搶','拟':'擬','挽':'輓','拣':'揀',
    '挤':'擠','损':'損','摆':'擺','抚':'撫','搜':'搜','凭':'憑','虽':'雖','蝇':'蠅',
    '坏':'壞','块':'塊','块':'塊','块':'塊','坚':'堅','坛':'壇','垄':'壟','垫':'墊',
    '执':'執','场':'場','尝':'嘗','尧':'堯','尽':'盡','岂':'豈','峡':'峽','岭':'嶺',
    '币':'幣','废':'廢','开':'開','弯':'彎','张':'張','强':'強','归':'歸','怀':'懷',
  };
  for(const k in simp2trad) m[k] = simp2trad[k];
  // ── 數字：阿拉伯 ↔ 中文（雙向 collapse 成阿拉伯） ──
  const cnDigits = {'零':'0','〇':'0','一':'1','二':'2','兩':'2','两':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9'};
  for(const k in cnDigits) m[k] = cnDigits[k];
  // ── 全形數字 → 半形 ──
  for(let i = 0; i < 10; i++) m[String.fromCharCode(0xFF10 + i)] = String(i);
  // ── 全形英文字母 → 半形 ──
  for(let i = 0; i < 26; i++){
    m[String.fromCharCode(0xFF21 + i)] = String.fromCharCode(0x41 + i).toLowerCase();
    m[String.fromCharCode(0xFF41 + i)] = String.fromCharCode(0x41 + i).toLowerCase();
  }
  return m;
})();

// ============ Storage ============
function save(){
  clearTimerRef('save');
  state.timers.save = setTimeout(() => {
    try{
      localStorage.setItem(STORAGE, JSON.stringify({
        text: els.script.value,
        speed:state.speed, fontSize:state.fontSize, lineHeight:state.lineHeight,
        fontColor:state.fontColor, bgColor:state.bgColor,
        mirrorH:state.mirrorH, mirrorV:state.mirrorV,
        lang:state.lang,
      }));
    }catch(e){
      console.warn('[teleprompter] save failed', e);
      if(!state._quotaWarned && (e.name === 'QuotaExceededError' || /quota/i.test(e.message||''))){
        state._quotaWarned = true;
        toast('稿件過大，無法自動保存（localStorage 已滿）', 3000);
      }
    }
  }, 300);
  try{ localStorage.removeItem('teleprompter:v1'); }catch(e){}
}
function load(){
  let raw;
  try{ raw = localStorage.getItem(STORAGE); }catch(e){ return; }
  if(!raw) return;
  let d;
  try{ d = JSON.parse(raw); }catch(e){ console.warn('[teleprompter] load parse failed', e); return; }
  if(typeof d !== 'object' || !d) return;
  if(typeof d.text === 'string') els.script.value = d.text;
  if(typeof d.speed === 'number') setSpeed(d.speed);
  if(typeof d.fontSize === 'number') setFontSize(d.fontSize);
  if(typeof d.lineHeight === 'number') setLineHeight(d.lineHeight);
  if(typeof d.fontColor === 'string') setFontColor(d.fontColor);
  if(typeof d.bgColor === 'string') setBgColor(d.bgColor);
  // 用 !! 強制 boolean，避免 falsy 值漏清 class
  toggleMirror('H', !!d.mirrorH);
  toggleMirror('V', !!d.mirrorV);
  if(typeof d.lang === 'string'){ state.lang = d.lang; els.lang.value = d.lang; }
}

// ============ Settings ============
function setSpeed(v){
  v = Math.max(1, Math.min(100, +v||1));
  state.speed = v; els.speed.value = v; els.speedNum.value = v; save();
}
function setFontSize(v){
  v = Math.max(24, Math.min(160, +v||64));
  state.fontSize = v; els.fontSize.value = v; els.fontSizeNum.value = v;
  els.scrollInner.style.fontSize = v + 'px';
  reanchor();
  save();
}
function setLineHeight(v){
  v = Math.max(110, Math.min(240, +v||160));   // 下限拉到 110，避免大字級行間貼死
  state.lineHeight = v; els.lineHeight.value = v; els.lineHeightNum.value = v;
  els.scrollInner.style.lineHeight = (v/100);
  reanchor();
  save();
}
// layout 變動後（字級/行高/視窗 resize/全螢幕）重新對齊到當前 charIdx
function reanchor(){
  if(state.charSpans.length === 0) return;
  state.targetPosition = targetForCharIdx(state.charIdx);
  state.position = state.targetPosition;
  applyScroll();
}
function setFontColor(v){
  state.fontColor = v; els.fontColor.value = v;
  els.scrollInner.style.color = v;
  warnIfLowContrast();
  save();
}
function setBgColor(v){
  state.bgColor = v; els.bgColor.value = v;
  els.stage.style.background = v;
  warnIfLowContrast();
  save();
}
function _luma(hex){
  // 計算相對亮度（WCAG 用，sRGB 線性化簡化版）
  const m = hex.match(/^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);
  if(!m) return 0;
  const v = [m[1],m[2],m[3]].map(h => {
    const c = parseInt(h,16)/255;
    return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  });
  return 0.2126*v[0] + 0.7152*v[1] + 0.0722*v[2];
}
function warnIfLowContrast(){
  const l1 = _luma(state.fontColor) + 0.05;
  const l2 = _luma(state.bgColor) + 0.05;
  const ratio = l1 > l2 ? l1/l2 : l2/l1;
  if(ratio < 3){
    toast('字色與背景對比過低（' + ratio.toFixed(1) + ':1），畫面可能讀不清', 2400);
  }
}
function toggleMirror(axis, force){
  const key = axis === 'H' ? 'mirrorH' : 'mirrorV';
  state[key] = force === undefined ? !state[key] : force;
  els.stage.classList.toggle('mirror-h', state.mirrorH);
  els.stage.classList.toggle('mirror-v', state.mirrorV);
  els.mirrorH.classList.toggle('on', state.mirrorH);
  els.mirrorV.classList.toggle('on', state.mirrorV);
  save();
}

// ============ Render ============
function normChar(c){
  if(!c) return '';
  c = c.toLowerCase();
  if(PUNCT.test(c)) return '';
  // 套等價映射：同音字、簡繁、數字、全形 → 代表字
  return NORMALIZE_MAP[c] || c;
}

function renderText(){
  const realScript = els.script.value;
  const isPlaceholder = !realScript;
  const txt = realScript || '（在左側輸入或匯入講稿…）';
  const frag = document.createDocumentFragment();
  state.charSpans = [];
  state.charNorms = [];
  for(const ch of txt){
    if(ch === '\n'){ frag.appendChild(document.createElement('br')); continue; }
    const span = document.createElement('span');
    span.className = 'ch';
    if(isPlaceholder) span.classList.add('placeholder');
    span.textContent = ch;
    const n = normChar(ch);
    // placeholder 路徑下不入 charSpans/charNorms：保住 startVoice 第 987 行的 length===0 守門
    if(n && !isPlaceholder){
      span.dataset.i = state.charSpans.length;
      state.charSpans.push(span);
      state.charNorms.push(n);
    }
    frag.appendChild(span);
  }
  // textarea 改稿後 charIdx 可能越界，必須 clamp
  if(state.charIdx > state.charSpans.length){
    state.charIdx = state.charSpans.length;
  }
  els.scrollInner.replaceChildren(frag);
  updateCharCount();
  // 全量重畫（DOM 整片新換）
  fullPaintHighlight();
  // layout 變了，重算對齊位置
  if(state.charIdx > 0){
    state.targetPosition = targetForCharIdx(state.charIdx);
    state.position = state.targetPosition;
    applyScroll();
  }
}
function updateCharCount(){
  els.charCount.textContent = state.charNorms.length + ' 字';
}
// 增量更新：只動 [prevIdx, charIdx] 區間，避免每次 onresult 都掃 2000+ 個 span
function updateHighlight(prevIdx){
  if(prevIdx === undefined){ fullPaintHighlight(); return; }
  const from = Math.max(0, Math.min(prevIdx, state.charIdx));
  const to = Math.min(state.charSpans.length, Math.max(prevIdx, state.charIdx) + 1);
  for(let i = from; i < to; i++){
    const cls = state.charSpans[i].classList;
    if(i < state.charIdx){ cls.add('spoken'); cls.remove('current'); }
    else if(i === state.charIdx){ cls.add('current'); cls.remove('spoken'); }
    else{ cls.remove('spoken','current'); }
  }
}
function fullPaintHighlight(){
  for(let i = 0; i < state.charSpans.length; i++){
    const cls = state.charSpans[i].classList;
    if(i < state.charIdx){ cls.add('spoken'); cls.remove('current'); }
    else if(i === state.charIdx){ cls.add('current'); cls.remove('spoken'); }
    else{ cls.remove('spoken','current'); }
  }
}

// ============ Scroll ============
function maxScroll(){
  return Math.max(0, els.scrollInner.scrollHeight - els.scroll.clientHeight);
}
function applyScroll(){
  els.scroll.scrollTop = state.position;
  const max = maxScroll();
  els.progressBar.style.width = max ? Math.min(100, state.position/max*100) + '%' : '0%';
}
function charY(i){
  if(state.charSpans.length === 0) return 0;
  // 自我 clamp：避免 charIdx >= length 時拿到 undefined → offsetTop=0 → 畫面跳回頂端
  const idx = Math.max(0, Math.min(i, state.charSpans.length - 1));
  const sp = state.charSpans[idx];
  if(!sp) return 0;
  return sp.offsetTop + sp.offsetHeight/2;
}
function targetForCharIdx(i){
  if(state.charSpans.length === 0) return 0;
  const y = charY(i);
  return Math.max(0, Math.min(maxScroll(), y - els.scroll.clientHeight/2));
}

// ============ Loop ============
function tick(t){
  if(state.mode === 'idle'){ state.raf = null; return; }
  if(!state.lastT) state.lastT = t;
  const dt = (t - state.lastT) / 1000;
  state.lastT = t;

  if(state.mode === 'auto'){
    const pxPerSec = state.speed * 5;
    state.position += pxPerSec * dt;
    const max = maxScroll();
    if(state.position >= max){
      state.position = max;
      celebrateCompletion();
      setMode('idle');
    }
    applyScroll();
    state.raf = requestAnimationFrame(tick);
  }else if(state.mode === 'voice'){
    const diff = state.targetPosition - state.position;
    if(Math.abs(diff) < 0.5){
      // 已對齊到 target，沒必要繼續空轉 RAF；下次 targetPosition 改變時 ensureLoop() 重啟
      state.position = state.targetPosition;
      applyScroll();
      state.raf = null;
      return;
    }
    state.position += diff * Math.min(1, dt * 4);
    applyScroll();
    state.raf = requestAnimationFrame(tick);
  }else{
    state.raf = null;
  }
}

function ensureLoop(){
  if(!state.raf) state.raf = requestAnimationFrame(tick);
}

// 統一清掉 SR 物件 + 相關 state + 排隊中的 SR timer
function disposeRecognition(){
  // 先廢 token：onend / onresult 已在 microtask queue 的也會被 token guard 擋
  state.recognitionToken++;
  if(state.recognition){
    const oldRec = state.recognition;
    try{ oldRec.onend = null; oldRec.onresult = null; oldRec.onerror = null; oldRec.onstart = null; oldRec.abort(); }catch(e){}
    state.recognition = null;
  }
  // starting 與 token 同生命週期；避免 throw 路徑卡住「starting=true」鎖死按鈕
  state.starting = false;
  state.recognitionBaseFinal = '';
  state.recognitionLastFinalIndex = 0;
  state.recognitionLastEndAt = 0;
  state.recognitionRestartCount = 0;
  state.recentEnds = [];
  clearTimerRef('onendRestart');
  clearTimerRef('resetRestart');
  clearTimerRef('startRetry');
  clearTimerRef('langSwitch');
}

function setMode(m){
  // 進非 idle mode 前若還在倒數，統一取消 → 避免 mode='voice' && counting=true 共存
  if(state.counting && m !== 'idle') cancelCountdown();
  state.mode = m;
  state.lastT = 0;
  // 切走 voice：完整清掉 SR + 釋放麥克風
  if(m !== 'voice' && state.recognition){
    disposeRecognition();
    releaseMicStream();
  }
  if(m === 'idle'){
    els.playBtn.textContent = '▶ 自動';
    els.playBtn.classList.add('primary');
    els.modePill.classList.remove('live');
    els.modeLabel.textContent = '手動';
    els.micBtn.classList.remove('on');
    els.micBtn.textContent = '🎤 跟讀';
    els.indicator.classList.remove('listening');
    els.stageMicPill.classList.remove('show');
  }else if(m === 'auto'){
    els.playBtn.textContent = '❚❚ 暫停';
    els.playBtn.classList.remove('primary');
    els.modePill.classList.add('live');
    els.modeLabel.textContent = '自動播放';
    els.micBtn.classList.remove('on');
    els.micBtn.textContent = '🎤 跟讀';
    els.indicator.classList.remove('listening');
    els.stageMicPill.classList.remove('show');
    ensureLoop();
  }else if(m === 'voice'){
    els.playBtn.textContent = '▶ 自動';
    els.playBtn.classList.add('primary');
    els.modePill.classList.add('live');
    els.modeLabel.textContent = '語音跟讀';
    els.micBtn.classList.add('on');
    els.micBtn.textContent = '⏹ 停止';
    els.indicator.classList.add('listening');
    els.stageMicPill.classList.add('show');
    ensureLoop();
  }
}

// 找出目前視線指示線（畫面中央）位置對應的 char index
// 用來做「軟重置」——對齊到使用者現在看到的字，而不是回開頭
function findCharIdxNearViewportCenter(){
  if(state.charSpans.length === 0) return 0;
  const targetY = state.position + els.scroll.clientHeight / 2;
  for(let i = 0; i < state.charSpans.length; i++){
    const sp = state.charSpans[i];
    const centerY = sp.offsetTop + sp.offsetHeight / 2;
    if(centerY >= targetY){
      if(i > 0){
        const prevCenter = state.charSpans[i-1].offsetTop + state.charSpans[i-1].offsetHeight/2;
        if(targetY - prevCenter < centerY - targetY) return i - 1;
      }
      return i;
    }
  }
  return state.charSpans.length - 1;
}

function reset(opts){
  opts = opts || {};
  // 啟動麥克風 await 期間擋 R：避免 V+R 競態雙開 SR / 對齊到舊 charNorms
  if(state.starting){ toast('正在啟動麥克風，稍候再試', 1500); return; }
  // 念完稿尾 charIdx===length 時，findCharIdxNearViewportCenter 只能回 length-1（無意義）
  // 此時無條件 hardReset 回開頭，符合使用者「念完想重來」的直覺
  const atEnd = state.charSpans.length > 0 && state.charIdx >= state.charSpans.length;
  const hardReset = opts.toStart || state.mode !== 'voice' || atEnd;

  if(state.mode === 'auto') setMode('idle');
  if(state.counting) cancelCountdown();

  if(hardReset){
    state.position = 0;
    state.targetPosition = 0;
    state.charIdx = 0;
  }else{
    state.charIdx = findCharIdxNearViewportCenter();
    state.targetPosition = state.position;
  }

  state.manualScrollLock = 0;
  state.lastAdvanceAt = 0;
  state.stuckWarned = false;
  els.recogStrip.textContent = '';
  resetCompletion();
  fullPaintHighlight();
  applyScroll();

  // voice 模式：完整 dispose + 80ms 後重建（清瀏覽器內部 ev.results）
  // 用 token snapshot guard 防使用者連按 R 雙啟動 SR
  if(state.mode === 'voice'){
    disposeRecognition();
    const myGen = state.recognitionToken;
    clearTimerRef('resetRestart');
    state.timers.resetRestart = setTimeout(() => {
      if(state.mode === 'voice' && state.recognitionToken === myGen) startVoice({silent:true});
    }, 80);
    toast(hardReset ? '已回到開頭' : '已重新對齊到目前位置，繼續念', 1400);
  }
}

// ============ Auto play ============
function toggleAuto(){
  // 啟動麥克風 await 期間擋空白鍵：避免 mode='voice' && counting=true 共存
  if(state.starting){ toast('正在啟動麥克風，稍候再試', 1500); return; }
  if(state.counting){ cancelCountdown(); return; }
  if(state.mode === 'auto') return setMode('idle');
  if(state.mode === 'voice') stopVoice();
  countdown(3, () => setMode('auto'));
}
function cancelCountdown(){
  state.counting = false;
  clearTimerRef('countdown');
  els.countdown.classList.remove('show');
  els.cdNum.textContent = '';
  els.cdCap.textContent = '';
}

// ============ Completion ritual ============
function celebrateCompletion(){
  els.progressBar.classList.add('done');
  els.completionMark.classList.add('show');
  clearTimerRef('completion');
  state.timers.completion = setTimeout(() => {
    els.completionMark.classList.remove('show');
  }, 1800);
}
function resetCompletion(){
  els.progressBar.classList.remove('done');
  els.completionMark.classList.remove('show');
  clearTimerRef('completion');
  clearTimerRef('completionStop');
}

// ============ Voice follow ============
function speechSupported(){
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

// 預先取得麥克風 stream 並持有——後續 SR 重啟全部 piggy-back 在同一個權限 grant 上
async function ensureMicStream(){
  if(state.micStream && state.micStream.active && state.micStream.getAudioTracks().some(t => t.readyState === 'live')){
    return true;
  }
  if(!navigator.mediaDevices?.getUserMedia) return true;
  try{
    state.micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    // macOS Sequoia 系統權限剛 grant 後第一個 stream 有時是空的，等 audio track 真的 live
    await new Promise(r => setTimeout(r, 80));
    const tracks = state.micStream.getAudioTracks();
    if(!tracks.length || tracks[0].readyState !== 'live'){
      try{ state.micStream.getTracks().forEach(t => t.stop()); }catch(e){}
      state.micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    }
    // 監聽 track 被 OS 搶走（Discord 開麥之類）
    state.micStream.getAudioTracks().forEach(t => {
      t.onended = () => {
        if(state.mode === 'voice'){
          toast('麥克風被其他應用搶走，跟讀已停止', 3000);
          stopVoice();
        }
      };
    });
    return true;
  }catch(e){
    if(e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError'){
      const isMac = /Mac/i.test(navigator.platform);
      toast(isMac
        ? '麥克風被拒。請至「系統設定 → 隱私 → 麥克風」開啟瀏覽器'
        : '麥克風被拒。點網址列鎖頭 → 網站設定 → 麥克風 → 允許', 5000);
    }else if(e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError'){
      toast('找不到麥克風裝置', 3000);
    }else if(e.name === 'NotReadableError'){
      toast('麥克風被其他應用佔用，請先關 Discord/Zoom 等', 4000);
    }else{
      toast('無法取得麥克風：' + (e.message || e.name), 3500);
    }
    return false;
  }
}
function releaseMicStream(){
  if(state.micStream){
    try{ state.micStream.getTracks().forEach(t => { t.onended = null; t.stop(); }); }catch(e){}
    state.micStream = null;
  }
}
function toast(msg, ms=2200){
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  clearTimerRef('toast');
  state.timers.toast = setTimeout(()=> els.toast.classList.remove('show'), ms);
}

async function startVoice(opts){
  opts = opts || {};
  if(state.starting) return;  // 防止 ensureMicStream await 期間被重入呼叫
  if(!speechSupported()){
    toast('此瀏覽器不支援語音識別，請改用 Chrome / Edge');
    return;
  }
  if(state.charNorms.length === 0){
    toast('請先在左側輸入講稿');
    return;
  }
  if(!navigator.onLine){
    toast('離線狀態，語音識別需要網路。可改用「自動播放」', 3500);
    return;
  }
  if(location.protocol === 'file:' && !sessionStorage.getItem('teleprompter:file-warned')){
    sessionStorage.setItem('teleprompter:file-warned', '1');
    toast('file:// 模式下每次都要重新授權麥克風，建議用 啟動-Mac.command 開', 4000);
  }

  state.starting = true;
  // 啟動前就 ++token 鎖定本次 generation；任何中途讓 token 改變的事件（reset/stopVoice/lang change）
  // 都會讓本流程在 await 後 token mismatch → 放棄。**不再在後段二次 ++**。
  const myToken = ++state.recognitionToken;
  let micOk;
  try{
    micOk = await ensureMicStream();
  }finally{
    // 用 try/finally 保險清 starting：即使 await 內部 throw（極不可能）也不會卡死按鈕
    state.starting = false;
  }
  if(!micOk) return;
  // 嚴格 OR：token 變了或被切走 mode 都放棄；mode 必須是 idle（即將進 voice）或 voice（lang 切換重啟）
  if(myToken !== state.recognitionToken) return;
  if(state.mode !== 'idle' && state.mode !== 'voice') return;

  // 若已有舊 SR（少數情況：lang 切換邊界），徹底清掉避免雙開
  if(state.recognition){
    const oldRec = state.recognition;
    try{ oldRec.onend = null; oldRec.onresult = null; oldRec.onerror = null; oldRec.abort(); }catch(e){}
    state.recognition = null;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = state.lang || 'zh-TW';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  // 沿用上面已 ++ 過的 myToken，不再二次 ++
  state.recognitionBaseFinal = '';
  state.recognitionLastFinalIndex = 0;
  state.recognitionLastEndAt = 0;
  state.recognitionRestartCount = 0;
  state.lastAdvanceAt = 0;
  state.stuckWarned = false;

  rec.onresult = (ev) => {
    if(myToken !== state.recognitionToken) return;
    if(state.mode !== 'voice') return;  // 深度防禦：mode 已被切走時 microtask 仍可能跑
    if(state.charNorms.length === 0) return;

    let interim = '';
    for(let i = ev.resultIndex; i < ev.results.length; i++){
      const r = ev.results[i];
      if(r.isFinal){
        if(i >= state.recognitionLastFinalIndex){
          state.recognitionBaseFinal += r[0].transcript;
          state.recognitionLastFinalIndex = i + 1;
        }
      }else{
        interim += r[0].transcript;
      }
    }
    // 激進截尾，避免 recent 對到「已念過的歷史」
    if(state.recognitionBaseFinal.length > 80){
      state.recognitionBaseFinal = state.recognitionBaseFinal.slice(-40);
    }

    const all = state.recognitionBaseFinal + interim;
    const recent = normalizeAll(all).slice(-16);
    if(recent.length < 4) return;

    const newIdx = alignAndAdvance(recent);

    // 卡住偵測：onresult 觸發但 charIdx 沒動
    if(newIdx === state.charIdx){
      if(state.lastAdvanceAt === 0) state.lastAdvanceAt = Date.now();
      else if(!state.stuckWarned && Date.now() - state.lastAdvanceAt > 6000){
        // 卡 6 秒：自動把 charIdx 拉到視線中央位置（不只 toast，主動 self-heal）
        const fallbackIdx = findCharIdxNearViewportCenter();
        if(fallbackIdx > state.charIdx){
          const prev = state.charIdx;
          state.charIdx = fallbackIdx;
          state.lastAdvanceAt = Date.now();
          state.recognitionBaseFinal = '';
          state.recognitionLastFinalIndex = ev.results.length;
          updateHighlight(prev);
          toast('已自動對齊到目前視線位置', 1800);
        }
        state.stuckWarned = true;
        if(Date.now() - state.lastAdvanceAt > 10000){
          toast('對不上時可按 R 重對齊到目前位置', 3000);
        }
      }
      return;
    }

    if(newIdx > state.charIdx && newIdx <= state.charSpans.length){
      const prevIdx = state.charIdx;
      state.charIdx = newIdx;
      state.lastAdvanceAt = Date.now();
      state.stuckWarned = false;
      // 手動拖曳鎖定期間（觸控設備拉長到 3 秒）不更新 targetPosition，避免畫面飛走
      const lockMs = matchMedia('(pointer: coarse)').matches ? 3000 : 1500;
      if(Date.now() - state.manualScrollLock > lockMs){
        state.targetPosition = targetForCharIdx(state.charIdx);
        ensureLoop();
      }
      updateHighlight(prevIdx);
      els.recogStrip.innerHTML = '正在唸：<b>' + escapeHtml(recent) + '</b>';
      if(state.charIdx >= state.charSpans.length){
        // 念到稿尾：hard set 位置到 target、慶祝動畫，但**不**自動關麥
        // 留 outro 空間：使用者可繼續講「謝謝收看」「下次見」，自己按停止才釋放麥克風
        state.targetPosition = targetForCharIdx(state.charIdx);
        state.position = state.targetPosition;
        applyScroll();
        celebrateCompletion();
        toast('稿件結束 ✓ 麥克風保持開啟，可繼續念 outro', 4000);
      }
    }
  };
  rec.onerror = (e) => {
    if(myToken !== state.recognitionToken) return;
    if(e.error === 'no-speech') return;
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      const isMac = /Mac/i.test(navigator.platform);
      toast(isMac
        ? '麥克風被拒。請至「系統設定 → 隱私 → 麥克風」開啟瀏覽器'
        : '點網址列鎖頭 → 網站設定 → 麥克風 → 允許', 5000);
      stopVoice();
    }else if(e.error === 'audio-capture'){
      toast('找不到麥克風，請檢查裝置', 3000);
      stopVoice();
    }else if(e.error === 'network'){
      toast('語音識別需要網路連線', 3000);
    }else if(e.error === 'language-not-supported'){
      toast('此語言模型不支援，請換一種', 3000);
      stopVoice();
    }else if(e.error === 'aborted'){
      // 使用者主動停或切換
    }else{
      toast('語音識別錯誤：' + e.error);
    }
  };
  rec.onend = () => {
    if(myToken !== state.recognitionToken) return;
    if(state.mode !== 'voice') return;

    // 10s 滑動窗：防止「每 250-500ms 穩定 onend」造成 mic indicator 持續閃爍 + 無上限 GC 壓力
    // 舊版只看 200ms 容錯窗 → count 永遠歸零，無法 self-stop
    const now = Date.now();
    state.recentEnds = (state.recentEnds || []).filter(t => now - t < 10000);
    state.recentEnds.push(now);
    if(state.recentEnds.length >= 8){
      toast('語音識別頻繁中斷，已停止', 3000);
      state.recentEnds = [];
      stopVoice();
      return;
    }
    state.recognitionLastEndAt = now;

    // 重啟改用 new SR：避開 Chrome 122+ 對舊 rec 物件 start() 的 InvalidStateError
    clearTimerRef('onendRestart');
    state.timers.onendRestart = setTimeout(() => {
      if(myToken === state.recognitionToken && state.mode === 'voice'){
        // 不是 rec.start()——而是建新 SR
        try{
          rec.onresult = null; rec.onerror = null; rec.onend = null;
        }catch(e){}
        state.recognition = null;
        startVoice({silent:true});
      }
    }, 150);
  };

  try{
    rec.start();
    state.recognition = rec;
    setMode('voice');
    if(!opts.silent) toast('開始語音跟讀，請開始念稿', 1800);
  }catch(e){
    if(e.name === 'InvalidStateError'){
      // 罕見：剛 abort 的 SR 內部還沒乾淨。等一下再重試
      // 必須寫入 state.timers，讓 disposeRecognition 能清掉，避免穿透 stopVoice / mode 切換
      clearTimerRef('startRetry');
      state.timers.startRetry = setTimeout(() => {
        state.timers.startRetry = null;
        if(state.mode === 'voice') startVoice({silent:true});
      }, 300);
    }else{
      toast('無法啟動麥克風：' + e.message);
    }
  }
}
function stopVoice(){
  disposeRecognition();
  releaseMicStream();
  setMode('idle');
}
function toggleVoice(){
  if(state.starting) return;
  if(state.counting) cancelCountdown();
  if(state.mode === 'voice') stopVoice();
  else if(state.mode === 'auto') { setMode('idle'); startVoice(); }
  else startVoice();
}

function normalizeAll(s){
  let out = '';
  for(const c of s){
    const n = normChar(c);
    if(n) out += n;
  }
  return out;
}
function escapeHtml(s){
  return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
}

// 字元對齊演算法：在 script[charIdx..charIdx+window] 找 recent 的最佳對齊終點
// 升級版：① 多 anchor（最後 2 字）② density check（命中字必須夠密集）③ 跨段稿件 fallback
function alignAndAdvance(recent){
  if(state.charNorms.length === 0) return state.charIdx;
  if(recent.length < 4) return state.charIdx;

  const start = Math.min(state.charIdx, state.charNorms.length);
  const window = 80;
  const end = Math.min(state.charNorms.length - 1, start + window);
  if(end < start) return state.charIdx;

  const gapLimit = Math.max(2, Math.min(4, Math.floor(recent.length * 0.33)));
  const reverseSpan = Math.max(6, Math.floor(recent.length * 1.5));
  const minScore = recent.length >= 8 ? 4 : 3;

  let bestEnd = -1;
  let bestScore = 0;
  const lastChar = recent[recent.length - 1];
  const secondLastChar = recent.length >= 2 ? recent[recent.length - 2] : null;

  // 第一輪：以 last char 為 anchor
  for(let e = start; e <= end; e++){
    if(state.charNorms[e] !== lastChar) continue;
    let si = e - 1, ri = recent.length - 2, score = 1, gaps = 0, lastMatchSi = e;
    while(ri >= 0 && si >= start && gaps < gapLimit && (e - si) < reverseSpan){
      if(state.charNorms[si] === recent[ri]){ score++; lastMatchSi = si; si--; ri--; }
      else { gaps++; si--; }
    }
    // density check：命中字之間平均距離不能超過 1.7（避免「a__b__c__d」這種稀疏對齊）
    const span = e - lastMatchSi + 1;
    const density = span > 0 ? score / span : 0;
    if(density < 0.55) continue;
    // 平局取靠 start 較近（防重複句跳到尾段）
    if(score > bestScore || (score === bestScore && (bestEnd === -1 || e < bestEnd))){
      bestScore = score; bestEnd = e;
    }
  }

  // 第二輪：若 last char anchor 失敗，試 secondLastChar 當 anchor（救「念到一半剛說完一字立刻 onresult」的情況）
  if(bestScore < minScore && secondLastChar !== null){
    for(let e = start; e <= end - 1; e++){
      if(state.charNorms[e] !== secondLastChar) continue;
      let si = e - 1, ri = recent.length - 3, score = 1, gaps = 0, lastMatchSi = e;
      while(ri >= 0 && si >= start && gaps < gapLimit && (e - si) < reverseSpan){
        if(state.charNorms[si] === recent[ri]){ score++; lastMatchSi = si; si--; ri--; }
        else { gaps++; si--; }
      }
      const span = e - lastMatchSi + 1;
      const density = span > 0 ? score / span : 0;
      if(density < 0.55) continue;
      if(score > bestScore || (score === bestScore && (bestEnd === -1 || e < bestEnd))){
        bestScore = score; bestEnd = e;
      }
    }
  }

  if(bestScore >= minScore && bestEnd >= start){
    return bestEnd + 1;
  }
  return state.charIdx;
}

// ============ Countdown ============
const COUNTDOWN_CAPTIONS = {3:'深呼吸', 2:'看向鏡頭', 1:'準備'};
function countdown(n, done){
  state.counting = true;
  els.countdown.classList.add('show');
  let i = n;
  const step = () => {
    if(!state.counting) return;
    if(i <= 0){
      els.cdNum.textContent = '▶';
      els.cdCap.textContent = '';
      state.timers.countdown = setTimeout(() => {
        state.counting = false;
        els.countdown.classList.remove('show');
        els.cdNum.textContent = '';
        done && done();
      }, 350);
      return;
    }
    els.cdNum.style.animation = 'none';
    els.cdCap.style.animation = 'none';
    void els.cdNum.offsetWidth;
    els.cdNum.style.animation = '';
    els.cdCap.style.animation = '';
    els.cdNum.textContent = i;
    els.cdCap.textContent = COUNTDOWN_CAPTIONS[i] || '';
    i--;
    state.timers.countdown = setTimeout(step, 700);
  };
  step();
}

// ============ Fullscreen ============（含 webkit prefix fallback）
function fullscreen(){
  const inFs = document.fullscreenElement || document.webkitFullscreenElement;
  if(!inFs){
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen;
    if(req){
      req.call(el).catch(() => toast('全螢幕請求被拒'));
    }else{
      document.body.classList.add('fullscreen');  // iOS Safari fallback
    }
  }else{
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if(exit) exit.call(document);
    document.body.classList.remove('fullscreen');
  }
}
['fullscreenchange', 'webkitfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.body.classList.toggle('fullscreen', inFs);
    setTimeout(reanchor, 200);  // Safari 需要 ≥ 200ms 才 layout 穩定
  })
);

// ResizeObserver 加 feature detect（Safari 13.0 / 老瀏覽器沒這 API 會直接 throw）
if(typeof ResizeObserver !== 'undefined'){
  const _resizeObserver = new ResizeObserver(() => {
    if(state.charSpans.length > 0) reanchor();
  });
  window.addEventListener('load', () => {
    if(els.scrollInner) _resizeObserver.observe(els.scrollInner);
  });
}
window.addEventListener('resize', () => reanchor());

// 切到背景／回前景：voice 模式下避免 RAF throttle 造成的位置漂移
document.addEventListener('visibilitychange', () => {
  if(document.hidden){
    if(state.mode === 'voice') state.position = state.targetPosition;
  }else{
    if(state.mode === 'voice'){
      state.position = state.targetPosition;
      applyScroll();
      ensureLoop();
    }
  }
});

// 網路狀態
window.addEventListener('offline', () => {
  if(state.mode === 'voice'){ toast('已離線，跟讀已停止', 3000); stopVoice(); }
});
window.addEventListener('online', () => toast('網路已恢復', 1500));

// ============ Wiring ============
// textarea input 用 debounce 重建 DOM，長腳本不卡
els.script.addEventListener('input', () => {
  save();
  clearTimerRef('render');
  state.timers.render = setTimeout(() => {
    renderText();
    // 改稿後 voice 模式必須清掉舊辨識歷史 + 重啟 SR，否則 baseFinal 對齊到舊位置
    if(state.mode === 'voice'){
      state.recognitionBaseFinal = '';
      state.recognitionLastFinalIndex = 0;
      state.lastAdvanceAt = 0;
      state.stuckWarned = false;
    }
  }, 150);
});
els.speed.addEventListener('input', e => setSpeed(e.target.value));
els.speedNum.addEventListener('input', e => setSpeed(e.target.value));
els.fontSize.addEventListener('input', e => setFontSize(e.target.value));
els.fontSizeNum.addEventListener('input', e => setFontSize(e.target.value));
els.lineHeight.addEventListener('input', e => setLineHeight(e.target.value));
els.lineHeightNum.addEventListener('input', e => setLineHeight(e.target.value));
els.fontColor.addEventListener('input', e => setFontColor(e.target.value));
els.bgColor.addEventListener('input', e => setBgColor(e.target.value));
els.mirrorH.addEventListener('click', () => toggleMirror('H'));
els.mirrorV.addEventListener('click', () => toggleMirror('V'));
els.playBtn.addEventListener('click', toggleAuto);
els.resetBtn.addEventListener('click', reset);
els.fsBtn.addEventListener('click', fullscreen);
els.micBtn.addEventListener('click', toggleVoice);

els.lang.addEventListener('change', e => {
  state.lang = e.target.value; save();
  if(state.mode === 'voice'){
    clearTimerRef('langSwitch');
    stopVoice();
    const myGen = state.recognitionToken;
    state.timers.langSwitch = setTimeout(() => {
      // mode 跟 token 都要對才啟動
      if(state.recognitionToken === myGen) startVoice({silent:true});
    }, 200);
  }
});

els.importBtn.addEventListener('click', () => els.importFile.click());
els.importFile.addEventListener('change', e => {
  const f = e.target.files?.[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    if(typeof r.result !== 'string'){ toast('檔案讀取結果格式錯誤'); return; }
    els.script.value = r.result;
    renderText(); save(); reset();
    toast('已匯入：' + f.name, 1600);
  };
  r.onerror = () => toast('檔案讀取失敗：' + (r.error?.message || '未知錯誤'));
  r.readAsText(f, 'utf-8');
  // 重置 input value 才能再次匯入同一個檔
  els.importFile.value = '';
});

// Wheel：垂直鏡像時方向要反過來（不然使用者滾下感覺往上跑）
els.stage.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = state.mirrorV ? -e.deltaY : e.deltaY;
  state.position = Math.max(0, Math.min(maxScroll(), state.position + delta));
  state.targetPosition = state.position;
  state.manualScrollLock = Date.now();
  applyScroll();
}, {passive:false});

// Pointer drag：通吃 mouse + touch + pen，防止 dragY 卡死
let dragY = null;
function endDrag(){ dragY = null; els.stage.style.cursor = ''; }
els.stage.addEventListener('pointerdown', e => {
  // 只有點到 stage 自己或 scroll/scroll-inner 才開始拖（避免將來在 stage 內加按鈕時誤觸）
  const t = e.target;
  if(t !== els.stage && t !== els.scroll && t !== els.scrollInner && !t.classList?.contains('ch')) return;
  dragY = {y:e.clientY, p:state.position};
  els.stage.style.cursor = 'grabbing';
  els.stage.setPointerCapture?.(e.pointerId);
});
window.addEventListener('pointermove', e => {
  if(dragY === null) return;
  const delta = state.mirrorV ? -(e.clientY - dragY.y) : (e.clientY - dragY.y);
  state.position = Math.max(0, Math.min(maxScroll(), dragY.p - delta));
  state.targetPosition = state.position;
  state.manualScrollLock = Date.now();
  applyScroll();
});
window.addEventListener('pointerup', endDrag);
window.addEventListener('pointercancel', endDrag);
window.addEventListener('blur', endDrag);  // Cmd+Tab 切走也要清

// Keyboard：擋住 textarea/input/select 焦點，避免空白鍵把選單關掉去切自動播放
window.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if(tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT') return;
  if(e.code === 'Space'){ e.preventDefault(); toggleAuto(); }
  else if(e.key === 'v' || e.key === 'V'){ toggleVoice(); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); setSpeed(state.speed + 2); }
  else if(e.key === 'ArrowDown'){ e.preventDefault(); setSpeed(Math.max(1, state.speed - 2)); }
  else if(e.key === 'r' || e.key === 'R'){ reset(e.shiftKey ? {toStart:true} : {}); }
  else if(e.key === 'f' || e.key === 'F'){ fullscreen(); }
  else if(e.key === 'Escape'){ if(document.body.classList.contains('fullscreen')) fullscreen(); }
});

// ============ Init ============
load();
setFontSize(state.fontSize);
setLineHeight(state.lineHeight);
setFontColor(state.fontColor);
setBgColor(state.bgColor);
// 不再塞示範稿件——改用 placeholder 提示，避免使用者第一次按全螢幕直接念到示範文
// renderText 在空稿時會顯示「（在左側輸入或匯入講稿…）」當 placeholder
renderText();
applyScroll();

// 偵測平台 & SR 能力
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isMacSafari = !isIOS && /^((?!chrome|android|crios).)*safari/i.test(navigator.userAgent);
const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

if(!speechSupported()){
  els.micBtn.disabled = true;
  els.micBtn.title = '此瀏覽器不支援語音識別（請改用 Chrome / Edge）';
  els.micBtn.textContent = '🎤 不支援';
}else if(isIOS){
  // iOS Safari 連續模式破碎、PWA 模式 SR 完全壞——直接 disable，引導用桌面
  els.micBtn.disabled = true;
  els.micBtn.title = 'iOS 連續語音識別行為破碎，請用桌面 Chrome';
  els.micBtn.textContent = '🎤 iOS 不支援';
}else if(isMacSafari){
  els.micBtn.title = 'Safari 對連續語音識別支援有限，建議用 Chrome / Edge';
}
</script>
</body>
</html>
